name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  manifest:
    name: validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: validate JSON syntax
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty .codex-plugin/plugin.json
          jq empty hooks/hooks.json
          jq empty .mcp.json
          for f in tests/fixtures/*.json; do jq empty "$f"; done
      - name: manifest versions stay in lockstep
        run: |
          claude_v=$(jq -r .version .claude-plugin/plugin.json)
          codex_v=$(jq -r .version .codex-plugin/plugin.json)
          manifest_v=$(jq -r '."."' .release-please-manifest.json)
          test "$claude_v" = "$codex_v"
          test "$claude_v" = "$manifest_v"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: claude plugin validate (plugin manifest)
        run: claude plugin validate .claude-plugin/plugin.json

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck scripts/ and tests/
        run: shellcheck -x scripts/*.sh tests/*.sh

  cross-platform:
    name: ${{ matrix.os }} cross-platform smokes
    needs: [manifest, shellcheck]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: hooks-json-valid
        run: bash tests/hooks-json-valid.sh
      - name: wrapper-fail-open
        run: bash tests/wrapper-fail-open.sh
      - name: wrapper-passthrough
        run: bash tests/wrapper-passthrough.sh
      - name: wrapper-protocol-shape
        run: bash tests/wrapper-protocol-shape.sh
      - name: wrapper-version-guard
        run: bash tests/wrapper-version-guard.sh
      - name: live-cli-smoke (skips without strata CLI installed)
        run: bash tests/live-cli-smoke.sh
